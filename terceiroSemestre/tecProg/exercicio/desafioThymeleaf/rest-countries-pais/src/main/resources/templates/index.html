<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grand Line Navigator</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
    <style>
        :root {
            --parchment:     #f2e0b6;
            --parchment-dark:#e0c98a;
            --ink:           #1a0e05;
            --ink-light:     #3a2510;
            --gold:          #8a5500;
            --gold-light:    #b07010;
            --red:           #7a1010;
            --ocean:         #1a3a5c;
            --shadow:        rgba(43,26,14,0.35);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background-color: var(--ocean);
            background-image:
                    radial-gradient(ellipse at 20% 50%, #0d2a45 0%, transparent 60%),
                    radial-gradient(ellipse at 80% 20%, #1e4a6e 0%, transparent 50%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'IM Fell English', serif;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 60px,
                    rgba(255,255,255,0.015) 60px,
                    rgba(255,255,255,0.015) 61px
            );
            pointer-events: none;
        }

        .map-container {
            position: relative;
            width: min(700px, 95vw);
            animation: floatIn 0.8s ease-out both;
        }

        @keyframes floatIn {
            from { opacity: 0; transform: translateY(40px) rotate(-1deg); }
            to   { opacity: 1; transform: translateY(0) rotate(0deg); }
        }

        .scroll {
            background: var(--parchment);
            background-image:
                    radial-gradient(ellipse at 10% 10%, #fff8e8 0%, transparent 40%),
                    radial-gradient(ellipse at 90% 90%, #d4b870 0%, transparent 40%);
            border-radius: 4px;
            padding: 50px 55px 45px;
            box-shadow:
                    0 0 0 3px var(--parchment-dark),
                    0 0 0 6px #a07830,
                    0 0 0 9px #7a5a20,
                    0 20px 60px rgba(0,0,0,0.6),
                    inset 0 0 80px rgba(180,130,40,0.15);
            position: relative;
        }

        .scroll::before {
            content: '';
            position: absolute;
            inset: 14px;
            border: 1.5px solid rgba(100,65,10,0.5);
            border-radius: 2px;
            pointer-events: none;
        }

        .corner {
            position: absolute;
            width: 40px;
            height: 40px;
            opacity: 0.8;
        }
        .corner--tl { top: 8px; left: 8px; }
        .corner--tr { top: 8px; right: 8px; transform: scaleX(-1); }
        .corner--bl { bottom: 8px; left: 8px; transform: scaleY(-1); }
        .corner--br { bottom: 8px; right: 8px; transform: scale(-1); }

        .compass {
            position: absolute;
            top: -45px;
            right: -45px;
            width: 100px;
            height: 100px;
            animation: spin 20s linear infinite;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5));
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }

        .title-area {
            text-align: center;
            margin-bottom: 30px;
        }

        /* SUBTÍTULO — fundo escuro sob o texto dourado */
        .subtitle {
            font-family: 'Cinzel', serif;
            font-size: 11px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #6a3e00;
            margin-bottom: 8px;
            font-weight: 600;
        }

        h1 {
            font-family: 'Cinzel Decorative', cursive;
            font-size: clamp(22px, 5vw, 32px);
            color: var(--ink);
            line-height: 1.15;
            text-shadow: 1px 1px 0 rgba(180,130,40,0.4);
            margin-bottom: 6px;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 16px 0 20px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1.5px;
            background: linear-gradient(to right, transparent, #8a5500, transparent);
        }
        .divider span {
            color: #7a4400;
            font-size: 18px;
        }

        /* DESCRIÇÃO — cor bem escura no parchment */
        p.desc {
            font-family: 'IM Fell English', serif;
            font-style: italic;
            color: var(--ink-light);
            font-size: 15px;
            text-align: center;
            line-height: 1.6;
            margin-bottom: 28px;
        }

        /* LABEL do campo */
        .form-label {
            font-family: 'Cinzel', serif;
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #5a3200;
            font-weight: 600;
            display: block;
            margin-bottom: 10px;
        }

        .form-row {
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 13px 18px;
            font-family: 'IM Fell English', serif;
            font-size: 16px;
            color: var(--ink);
            background: rgba(255,255,255,0.65);
            border: 2px solid #8a5a10;
            border-radius: 2px;
            outline: none;
            transition: all 0.2s;
            box-shadow: inset 0 2px 6px rgba(120,80,20,0.1);
        }
        input[type="text"]::placeholder { color: #7a5a20; font-style: italic; }
        input[type="text"]:focus {
            border-color: #6a3e00;
            background: rgba(255,255,255,0.85);
            box-shadow: 0 0 0 3px rgba(140,80,0,0.25), inset 0 2px 6px rgba(120,80,20,0.1);
        }

        button {
            padding: 13px 28px;
            font-family: 'Cinzel', serif;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #f5e4b0;
            background: linear-gradient(135deg, #6a0f0f 0%, #4e0a0a 100%);
            border: 2px solid #3e0808;
            border-radius: 2px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 3px 10px rgba(80,10,10,0.5), inset 0 1px 0 rgba(255,255,255,0.15);
            white-space: nowrap;
        }
        button:hover {
            background: linear-gradient(135deg, #8b1a1a 0%, #6a0f0f 100%);
            transform: translateY(-1px);
            box-shadow: 0 5px 16px rgba(80,10,10,0.6);
        }
        button:active { transform: translateY(0); }

        /* RODAPÉ — escuro o suficiente */
        .footer-note {
            text-align: center;
            margin-top: 22px;
            font-family: 'Cinzel', serif;
            font-size: 9px;
            letter-spacing: 2px;
            color: #5a3a00;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="map-container">

    <svg class="compass" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="46" fill="#1a3a5c" stroke="#c4830a" stroke-width="2"/>
        <circle cx="50" cy="50" r="38" fill="none" stroke="#c4830a" stroke-width="0.5" stroke-dasharray="3,5"/>
        <text x="50" y="16" text-anchor="middle" font-family="serif" font-size="10" fill="#f5e080" font-weight="bold">N</text>
        <text x="50" y="90" text-anchor="middle" font-family="serif" font-size="10" fill="#f5e080">S</text>
        <text x="88" y="54" text-anchor="middle" font-family="serif" font-size="10" fill="#f5e080">E</text>
        <text x="12" y="54" text-anchor="middle" font-family="serif" font-size="10" fill="#f5e080">W</text>
        <polygon points="50,20 46,50 50,55 54,50" fill="#c0392b"/>
        <polygon points="50,80 46,50 50,55 54,50" fill="#f5e080"/>
        <circle cx="50" cy="50" r="4" fill="#f5e080"/>
    </svg>

    <div class="scroll">

        <svg class="corner corner--tl" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
            <path d="M2,2 L18,2 M2,2 L2,18" stroke="#6a4010" stroke-width="2.5" fill="none"/>
            <path d="M8,8 L14,8 M8,8 L8,14" stroke="#8a5500" stroke-width="1.5" fill="none"/>
            <circle cx="5" cy="5" r="2.5" fill="#8a5500"/>
        </svg>
        <svg class="corner corner--tr" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
            <path d="M2,2 L18,2 M2,2 L2,18" stroke="#6a4010" stroke-width="2.5" fill="none"/>
            <path d="M8,8 L14,8 M8,8 L8,14" stroke="#8a5500" stroke-width="1.5" fill="none"/>
            <circle cx="5" cy="5" r="2.5" fill="#8a5500"/>
        </svg>
        <svg class="corner corner--bl" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
            <path d="M2,2 L18,2 M2,2 L2,18" stroke="#6a4010" stroke-width="2.5" fill="none"/>
            <path d="M8,8 L14,8 M8,8 L8,14" stroke="#8a5500" stroke-width="1.5" fill="none"/>
            <circle cx="5" cy="5" r="2.5" fill="#8a5500"/>
        </svg>
        <svg class="corner corner--br" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
            <path d="M2,2 L18,2 M2,2 L2,18" stroke="#6a4010" stroke-width="2.5" fill="none"/>
            <path d="M8,8 L14,8 M8,8 L8,14" stroke="#8a5500" stroke-width="1.5" fill="none"/>
            <circle cx="5" cy="5" r="2.5" fill="#8a5500"/>
        </svg>

        <div class="title-area">
            <p class="subtitle">⚓ Grand Line Navigation Charts ⚓</p>
            <h1>World Explorer</h1>
            <div class="divider"><span>✦</span></div>
            <p class="desc">Navegue pelos mares do conhecimento.<br>Digite o nome de qualquer nação e descubra seus segredos.</p>
        </div>

        <form action="/buscar" method="get">
            <label class="form-label" for="pais">☞ Destino da expedição</label>
            <div class="form-row">
                <input type="text" id="pais" name="pais" placeholder="Ex: Brazil, Japan, France..." required autocomplete="off"/>
                <button type="submit">Zarpar!</button>
            </div>
        </form>

        <p class="footer-note">— Insira o nome em inglês para consultar a RestCountries —</p>
    </div>
</div>

</body>
</html>
